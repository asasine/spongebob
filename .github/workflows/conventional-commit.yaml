name: Conventional Commit

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: ["main"]

jobs:
  check-title:
    name: Check PR Title
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Check conventional commit format
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;

            // Conventional commit pattern: type(optional scope): description
            // Types from conventionalcommits.org commonly used with release-plz
            const pattern = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+$/;

            if (pattern.test(title)) {
              console.log(`PR title "${title}" follows conventional commit format.`);
              return;
            }

            const body = [
              `**PR title does not follow [Conventional Commits](https://www.conventionalcommits.org/) format.**`,
              ``,
              `Please update the PR title to match the format: \`type(optional scope): description\``,
              ``,
              `Examples:`,
              `- \`feat: added new feature\``,
              `- \`fix(cli): corrected typo in help message\``,
              `- \`docs: updated README.md\``,
              ``,
              `Supported types: \`feat\`, \`fix\`, \`docs\`, \`style\`, \`refactor\`, \`perf\`, \`test\`, \`build\`, \`ci\`, \`chore\`, \`revert\``,
            ].join("\n");

            // Find existing bot comment to update instead of creating duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const marker = "**PR title does not follow [Conventional Commits]";
            const existing = comments.find(
              (c) => c.user.type === "Bot" && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body,
              });
            }

            core.setFailed(`PR title "${title}" does not follow conventional commit format.`);
